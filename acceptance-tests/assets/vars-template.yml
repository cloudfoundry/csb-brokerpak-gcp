env_name: {{.Bosh.BoshEnvName}}
azs:
  - us-central1-c

gcp:
  credentials: '{{.Google.GoogleCredentials}}'
  project: '{{.Google.GoogleProject}}'

cf_api_url: {{.CFAPIDomain}}
cf_admin_pass: "{{.CFAPIPass}}"
brokerpak:
  builtin:
    path: ./
  config: '{{.Brokerpak.GSBBrokerpakConfig}}'
  sources: |
    {}
  terraform:
    upgrades:
      enabled: true
  updates:
    enabled: true
compatibility:
  enable-beta-services: true
credhub:
  ca_cert_file: credhub_ca_cert.pem
  skip_ssl_validation: false
  uaa_client_name: {{.UAA.CHUAAClientName}}
  uaa_client_secret: {{.UAA.CHUAAClientSecret}}
  uaa_url: {{.UAA.CHUAAURL}}
  url: {{.UAA.CHCredHubURL}}
db: {{.DBData}}

provision:
  defaults: |
    {{.Brokerpak.GSBProvisionDefaults}}
request:
  property:
    validation:
      disabled: false
service:
  csb-google-postgres:
    plans: |+
      {{.Brokerpak.GSBServiceCsbGooglePostgresPlans}}
    provision:
      defaults: |+
        {{.Brokerpak.GSBProvisionDefaults}}
  csb-google-mysql:
    plans: |+
      {{.Brokerpak.GSBServiceCsbGoogleMysqlPlans}}
    provision:
      defaults: |+
        {{.Brokerpak.GSBProvisionDefaults}}
  csb-google-storage-bucket:
    plans: |+
      {{.Brokerpak.GSBServiceCsbGoogleStorageBucketPlans}}
    provision:
      defaults: |+
        {{.Brokerpak.GSBProvisionDefaults}}
  csb-google-redis:
    plans: |+
      {{.Brokerpak.GSBServiceCsbGoogleRedisPlans}}
    provision:
      defaults: |+
        {{.Brokerpak.GSBProvisionDefaults}}